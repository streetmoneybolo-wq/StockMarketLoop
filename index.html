<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Loop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header with Logo -->
        <header class="header">
            <div class="logo">
                <span class="logo-dot"></span>
                <h1>LOOP HUB</h1>
            </div>
        </header>

        <!-- Main Content Section -->
        <main class="main-content">
            <!-- Hero Section -->
            <section class="hero">
                <h2>Welcome to Stock Market Loop</h2>
                <p>Your gateway to smart investing and market insights</p>
            </section>

            <!-- Buttons Container - Fixed Layout -->
            <section class="buttons-container">
                <div class="button-wrapper">
                    <button class="btn btn-newsletter">Start Newsletter</button>
                </div>
                
                <div class="button-wrapper">
                    <button class="btn btn-contributor">Become Contributor</button>
                </div>
                
                <div class="button-wrapper">
                    <button class="btn btn-trade">Trade</button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
